name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v5
      - run: ./gradlew jsBrowserProductionWebpack
      - name: Assemble dist
        run: |
          mkdir -p dist
          cp build/kotlin-webpack/js/productionExecutable/*.js dist/
          cp build/processedResources/js/main/* dist/
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v5
      - run: ./gradlew jsTest

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install Playwright
        working-directory: e2e
        run: npm ci && npx playwright install chromium --with-deps
      - name: Start dev server
        run: ./gradlew jsBrowserDevelopmentRun &
      - name: Wait for server
        working-directory: e2e
        run: npx wait-on http://localhost:8080 --timeout 120000
      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test --project=chromium
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/

  deploy:
    needs: [build, test-unit, test-e2e]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
