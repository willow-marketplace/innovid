version: 2
project_name: teamcity

builds:
  - binary: teamcity
    main: ./tc
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/JetBrains/teamcity-cli/internal/version.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    hooks:
      post:
        - cmd: |
            sh -c '
            if [ "{{ .IsSnapshot }}" = "false" ] && [ "{{ .Os }}" = "$(go env GOOS)" ] && [ "{{ .Arch }}" = "$(go env GOARCH)" ]; then
              ver=$(chmod +x "{{ .Path }}"; "{{ .Path }}" --version)
              expected="teamcity version {{ .Version }}"
              if [ "$ver" != "$expected" ]; then
                echo "Version mismatch: expected \"$expected\" but got \"$ver\""
                exit 1
              fi
              echo "Version check passed: $ver"
            fi'
          output: true
        - cmd: |
            sh -c '
            if [ "{{ .Os }}" = "$(go env GOOS)" ] && [ "{{ .Arch }}" = "$(go env GOARCH)" ]; then
              chmod +x "{{ .Path }}"
              export TC_ACCEPTANCE_BINARY="{{ .Path }}"
              if [ "{{ .IsSnapshot }}" = "true" ]; then
                echo "Running guest-auth acceptance tests (snapshot)..."
              else
                echo "Running token-auth acceptance tests (release)..."
                export TC_ACCEPTANCE_TOKEN="${TEAMCITY_TOKEN}"
              fi
              go test -v -tags=acceptance ./acceptance -timeout 10m
            fi'
          output: true
        - cmd: |
            sh -c '
            set -e
            if [ "{{ .IsSnapshot }}" = "false" ] && [ "{{ .Os }}" != "linux" ] && [ "$SIGN" = "true" ]; then
              DIST_DIR="./dist/teamcity_{{ .Os }}_{{ .Arch }}{{ if eq .Arch "amd64" }}_v1{{ end }}{{ if eq .Arch "arm64" }}_v8.0{{ end }}"
              BINARY_NAME="teamcity{{ if eq .Os "windows" }}.exe{{ end }}"
              echo "Signing $DIST_DIR/$BINARY_NAME"
              codesign-client {{ if eq .Os "darwin" }}-denoted-content-type=application/x-mac-app-bin {{ end }}-signed-files-dir="$DIST_DIR/" "$DIST_DIR/$BINARY_NAME"
            fi'
          output: true

archives:
  - name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{- if eq .Arch "amd64" }}x86_64{{- else }}{{ .Arch }}{{ end }}'
    format_overrides:
      - goos: windows
        formats: ['zip']
    files:
      - LICENSE
      - README.md

nfpms:
  - package_name: teamcity
    file_name_template: '{{ .PackageName }}_{{ .Os }}_{{ .Arch }}'
    vendor: JetBrains s.r.o.
    homepage: https://github.com/JetBrains/teamcity-cli
    maintainer: JetBrains <teamcity-support@jetbrains.com>
    description: A command-line interface for TeamCity CI/CD server
    license: Apache-2.0
    formats:
      - apk
      - deb
      - rpm
      - archlinux
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/licenses/teamcity/LICENSE
      - src: README.md
        dst: /usr/share/doc/teamcity/README.md

npms:
  - name: "@jetbrains/teamcity-cli"
    description: A command-line interface for TeamCity CI/CD server
    homepage: https://github.com/JetBrains/teamcity-cli
    license: Apache-2.0
    author: JetBrains <teamcity-support@jetbrains.com>
    repository: https://github.com/JetBrains/teamcity-cli
    bugs: https://github.com/JetBrains/teamcity-cli/issues
    keywords:
      - teamcity
      - ci
      - cd
      - cli
      - jetbrains
      - devops
      - build
      - automation
    access: public
    tag: latest

aurs:
  - name: teamcity-bin
    homepage: https://github.com/JetBrains/teamcity-cli
    description: A command-line interface for TeamCity CI/CD server
    license: Apache-2.0
    maintainers:
      - "Viktor Tiulpin <viktor.tiulpin@jetbrains.com>"
    private_key: "{{ .Env.AUR_SSH_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/teamcity-bin.git"
    provides:
      - teamcity
    conflicts:
      - teamcity
    commit_author:
      name: teamcity-bot
      email: teamcity-support@jetbrains.com
    commit_msg_template: "chore: update to {{ .Tag }}"
    skip_upload: auto

brews:
  - name: teamcity
    repository:
      owner: JetBrains
      name: homebrew-utils
    commit_author:
      name: teamcity-bot
      email: teamcity-support@jetbrains.com
    commit_msg_template: "chore: update {{ .ProjectName }} to {{ .Tag }}"
    directory: Formula
    homepage: https://github.com/JetBrains/teamcity-cli
    description: A command-line interface for TeamCity CI/CD server
    license: Apache-2.0
    install: |
      bin.install "teamcity"

scoops:
  - repository:
      owner: JetBrains
      name: scoop-utils
    commit_author:
      name: teamcity-bot
      email: teamcity-support@jetbrains.com
    commit_msg_template: "chore: update {{ .ProjectName }} to {{ .Tag }}"
    homepage: https://github.com/JetBrains/teamcity-cli
    description: A command-line interface for TeamCity CI/CD server
    license: Apache-2.0

chocolateys:
  - name: TeamCityCLI
    title: TeamCity CLI
    authors: JetBrains
    owners: JetBrains
    summary: A command-line interface for TeamCity CI/CD server
    description: |
      {{ .ProjectName }} is a command-line interface for interacting with TeamCity CI/CD server.

      Features:
      - Manage builds, jobs, and projects from terminal
      - Stream build logs in real-time
      - JSON output for scripting
      - Multi-server support
    project_url: https://github.com/JetBrains/teamcity-cli
    icon_url: https://resources.jetbrains.com/storage/products/company/brand/logos/TeamCity_icon.png
    copyright: JetBrains s.r.o.
    license_url: https://github.com/JetBrains/teamcity-cli/blob/main/LICENSE
    require_license_acceptance: false
    project_source_url: https://github.com/JetBrains/teamcity-cli
    docs_url: https://jb.gg/tc/docs
    bug_tracker_url: https://jb.gg/tc/issues
    tags: teamcity ci cd cli jetbrains devops build automation
    release_notes: https://github.com/JetBrains/teamcity-cli/releases/tag/v{{ .Version }}
    api_key: '{{ .Env.CHOCOLATEY_API_KEY }}'
    source_repo: https://push.chocolatey.org/

winget:
  - name: TeamCityCLI
    publisher: JetBrains
    publisher_url: https://www.jetbrains.com/
    publisher_support_url: https://jb.gg/tc/issues
    short_description: A command-line interface for TeamCity CI/CD server
    description: |
      teamcity is a command-line interface for interacting with TeamCity CI/CD server.
      Manage builds, jobs, and projects without leaving your terminal.
    license: Apache-2.0
    license_url: https://github.com/JetBrains/teamcity-cli/blob/main/LICENSE
    copyright: JetBrains s.r.o.
    homepage: https://github.com/JetBrains/teamcity-cli
    tags:
      - teamcity
      - ci
      - cd
      - cli
      - devops
      - jetbrains
    release_notes_url: https://github.com/JetBrains/teamcity-cli/releases/tag/v{{ .Version }}
    repository:
      owner: tiulpin
      name: winget-pkgs
      branch: "JetBrains.TeamCityCLI-{{.Version}}"
      token: "{{ .Env.GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "New version: JetBrains.TeamCityCLI version {{.Version}}"

blobs:
  - provider: s3
    bucket: download-prod-cdn.jetbrains.com
    region: eu-west-1
    directory: resources/teamcity-cli/{{ .Version }}
    extra_files:
      - glob: dist/checksums.txt

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: '{{ incpatch .Version }}-snapshot'

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs[(:]'
      - '^test[(:]'
      - '^ci[(:]'
      - '^chore[(:]'
      - '^lint[(:]'
      - '^fixup!'
      - '^Update '
      - Merge pull request
      - Merge branch
  ai:
    use: anthropic
    model: claude-sonnet-4-6
    prompt: |
      You are writing release notes for teamcity (a command-line interface for the TeamCity CI/CD server).

      The output must have two sections, in this exact order:

      1. An intro under a `## What's New` heading. Write 2–4 short sentences total, organized into `### New Features`, `### Improvements`, and `### Bug Fixes` subheadings as appropriate. Only mention changes that are visible to CLI users. Omit any subheading that would be empty. Do not mention dependency bumps, linter config, test-only changes, or internal refactors here.

      2. The changelog under a `## Changelog` heading, reproduced word-for-word from the block delimited by `<commits>` tags below. Do not drop, reorder, rewrite, or summarize any line. Keep every SHA, commit message, PR number, and author handle intact. If the input already starts with a `## Changelog` heading, do not emit it a second time.

      Response rules:
      - Respond with ONLY the release-notes markdown. No preamble, no trailing commentary.
      - Do not use emojis anywhere.
      - The `## What's New` section comes first, the `## Changelog` section second.
      - Every commit line inside `<commits>` must appear exactly once in the final output.

      <commits>
      {{ .ReleaseNotes }}
      </commits>

release:
  github:
    owner: JetBrains
    name: teamcity-cli
  draft: false
  prerelease: auto
  mode: replace
  footer: |
    ## Installation

    ### macOS & Linux

    **Homebrew (recommended):**
    ```bash
    brew install jetbrains/utils/teamcity
    ```

    **Install script:**
    ```bash
    curl -fsSL https://jb.gg/tc/install | bash
    ```

    **Debian/Ubuntu:**
    ```bash
    curl -fsSLO https://github.com/JetBrains/teamcity-cli/releases/download/v{{ .Version }}/teamcity_linux_amd64.deb
    sudo dpkg -i teamcity_linux_amd64.deb
    ```

    **RHEL/Fedora:**
    ```bash
    sudo rpm -i https://github.com/JetBrains/teamcity-cli/releases/download/v{{ .Version }}/teamcity_linux_amd64.rpm
    ```

    **Arch Linux (AUR):**
    ```bash
    yay -S teamcity-bin
    ```

    ### Windows
    **Winget (recommended):**
    ```powershell
    winget install JetBrains.TeamCityCLI
    ```

    **Chocolatey:**
    ```powershell
    choco install TeamCityCLI
    ```

    **Scoop:**
    ```powershell
    scoop bucket add jetbrains https://github.com/JetBrains/scoop-utils
    scoop install teamcity
    ```

    **Manual:**
    Download `teamcity_{{ .Version }}_windows_x86_64.zip`, extract, and add to PATH.

    ### npm

    ```bash
    npm install -g @jetbrains/teamcity-cli
    ```

    ### Go Install

    ```bash
    go install github.com/JetBrains/teamcity-cli/tc@v{{ .Version }}
    ```

    ## Quick Start

    ```bash
    # Authenticate with your TeamCity server
    teamcity auth login

    # List recent builds
    teamcity run list

    # Start a build
    teamcity run start MyProject_Build --branch main --watch
    ```

    **[Full documentation](https://jb.gg/tc/docs)** — getting started, configuration, command reference, and more.

report_sizes: true

signs:
  - cmd: sh
    args:
      - -c
      - 'if [ "$SIGN" = "true" ]; then codesign-client -gpg-key "$FINGERPRINT" -signed-files-dir=./dist/ "${artifact}"; else echo "Skipping signing (SIGN != true)" && touch "${signature}"; fi'
    artifacts: checksum
    signature: "${artifact}.asc"
    output: true

git:
  ignore_tags:
    - nightly
