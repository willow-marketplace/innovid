info:
  title: WorkOS Widgets
  description: WorkOS Widgets API
  version: '1.0'
  contact: {}
tags: []
servers:
  - url: https://api.workos.com
    description: Production
  - url: https://api.workos-test.com
    description: Staging
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    MemberStatus:
      type: string
      enum:
        - Active
        - Invited
        - InviteExpired
        - InviteRevoked
        - NoInvite
    MemberActions:
      type: array
      items:
        type: string
        enum:
          - edit-role
          - resend-invite
          - revoke-invite
          - revoke-membership
    Member:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        emailVerified:
          type: boolean
        profilePictureUrl:
          type:
            - string
            - 'null'
        firstName:
          type:
            - string
            - 'null'
        lastName:
          type:
            - string
            - 'null'
        createdAt:
          format: date-time
          type: string
          description: An ISO 8601 timestamp.
          example: '2026-01-15T12:00:00.000Z'
        lastActivityAt:
          type:
            - string
            - 'null'
          format: date-time
        status:
          $ref: '#/components/schemas/MemberStatus'
        actions:
          $ref: '#/components/schemas/MemberActions'
        isLoggedInUser:
          oneOf:
            - type: boolean
              const: true
            - type: 'null'
        roles:
          oneOf:
            - type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  slug:
                    type: string
                  description:
                    type:
                      - string
                      - 'null'
                required:
                  - name
                  - slug
            - type: 'null'
      required:
        - id
        - email
        - emailVerified
        - createdAt
        - status
        - actions
    ListMetadata:
      type: object
      properties:
        before:
          type:
            - string
            - 'null'
          description: >-
            An object ID that defines your place in the list. When the ID is not
            present, you are at the start of the list.
          example: xxx_01HXYZ123456789ABCDEFGHIJ
        after:
          type:
            - string
            - 'null'
          description: >-
            An object ID that defines your place in the list. When the ID is not
            present, you are at the end of the list.
          example: xxx_01HXYZ987654321KJIHGFEDCBA
      required:
        - before
        - after
    MemberRole:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        default:
          type: boolean
        description:
          type:
            - string
            - 'null'
      required:
        - name
        - slug
        - default
    RolesAndConfigResponse:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/MemberRole'
        multipleRolesEnabled:
          type: boolean
      required:
        - roles
        - multipleRolesEnabled
    OrganizationInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        current:
          type: boolean
        favicon:
          type:
            - string
            - 'null'
      required:
        - id
        - name
        - current
    OrganizationsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationInfo'
      required:
        - data
    OAuthProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type:
            - string
            - 'null'
        firstName:
          type:
            - string
            - 'null'
        lastName:
          type:
            - string
            - 'null'
        profilePictureUrl:
          type:
            - string
            - 'null'
        lastLoginAt:
          type:
            - string
            - 'null'
          format: date-time
      required:
        - id
    Me:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type:
            - string
            - 'null'
        lastName:
          type:
            - string
            - 'null'
        locale:
          type:
            - string
            - 'null'
        profilePictureUrl:
          type:
            - string
            - 'null'
        oauthProfiles:
          oneOf:
            - type: object
              properties:
                AppleOAuth:
                  $ref: '#/components/schemas/OAuthProfile'
                GithubOAuth:
                  $ref: '#/components/schemas/OAuthProfile'
                GoogleOAuth:
                  $ref: '#/components/schemas/OAuthProfile'
                MicrosoftOAuth:
                  $ref: '#/components/schemas/OAuthProfile'
            - type: 'null'
      required:
        - id
        - email
    CreateTotpFactorResponse:
      type: object
      properties:
        authenticationFactor:
          allOf:
            - type: object
              properties:
                object:
                  type: string
                  enum:
                    - authentication_factor
                id:
                  type: string
                type:
                  type: string
                  enum:
                    - generic_otp
                    - sms
                    - totp
                    - webauthn
                user_id:
                  type:
                    - string
                    - 'null'
                sms:
                  oneOf:
                    - type: object
                      properties:
                        phone_number:
                          type: string
                      required:
                        - phone_number
                    - type: 'null'
                totp:
                  anyOf:
                    - type: object
                      properties:
                        issuer:
                          type: string
                        user:
                          type: string
                        secret:
                          type: string
                        qr_code:
                          type: string
                        uri:
                          type: string
                      required:
                        - issuer
                        - user
                        - secret
                        - qr_code
                        - uri
                    - type: object
                      properties:
                        issuer:
                          type: string
                        user:
                          type: string
                      required:
                        - issuer
                        - user
                    - type: 'null'
              required:
                - object
                - id
                - type
            - type: object
              properties:
                created_at:
                  type: string
                  format: date-time
                updated_at:
                  type: string
                  format: date-time
              required:
                - created_at
                - updated_at
        authenticationChallenge:
          allOf:
            - type: object
              properties:
                object:
                  type: string
                  enum:
                    - authentication_challenge
                id:
                  type: string
                expires_at:
                  type:
                    - string
                    - 'null'
                  format: date-time
                code:
                  type:
                    - string
                    - 'null'
                authentication_factor_id:
                  type: string
              required:
                - object
                - id
                - authentication_factor_id
            - type: object
              properties:
                created_at:
                  type: string
                  format: date-time
                updated_at:
                  type: string
                  format: date-time
              required:
                - created_at
                - updated_at
      required:
        - authenticationFactor
        - authenticationChallenge
    VerifyTotpFactorRequest:
      type: object
      properties:
        code:
          type: string
        authenticationChallengeId:
          type: string
      required:
        - code
        - authenticationChallengeId
    AuthenticationInformationResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            verificationMethods:
              type: object
              properties:
                Mfa:
                  oneOf:
                    - type: object
                      properties:
                        provider:
                          type: string
                          enum:
                            - MFA
                        isSetUp:
                          type: boolean
                        lastUsed:
                          type:
                            - string
                            - 'null'
                      required:
                        - provider
                        - isSetUp
                    - type: 'null'
                Password:
                  oneOf:
                    - type: object
                      properties:
                        provider:
                          type: string
                          enum:
                            - Password
                        isSetUp:
                          type: boolean
                        lastUsed:
                          type:
                            - string
                            - 'null'
                        isCurrentSession:
                          type: boolean
                      required:
                        - provider
                        - isSetUp
                        - isCurrentSession
                    - type: 'null'
                Passkey:
                  oneOf:
                    - type: object
                      properties:
                        provider:
                          type: string
                          enum:
                            - Passkey
                        isSetUp:
                          type: boolean
                        lastUsed:
                          type:
                            - string
                            - 'null'
                        passKeys:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                            required:
                              - id
                        isCurrentSession:
                          type: boolean
                      required:
                        - provider
                        - isSetUp
                        - passKeys
                        - isCurrentSession
                    - type: 'null'
            passwordSettings:
              type: object
              properties:
                isPasswordNumberRequired:
                  type: boolean
                isPasswordPwnedRequired:
                  type: boolean
                isPasswordSymbolRequired:
                  type: boolean
                isPasswordUppercaseRequired:
                  type: boolean
                passwordMinimumLength:
                  type: number
                passwordMinimumStrength:
                  type: number
              required:
                - isPasswordNumberRequired
                - isPasswordPwnedRequired
                - isPasswordSymbolRequired
                - isPasswordUppercaseRequired
                - passwordMinimumLength
                - passwordMinimumStrength
          required:
            - verificationMethods
            - passwordSettings
      required:
        - data
    CreatePasswordRequest:
      type: object
      properties:
        password:
          type: string
      required:
        - password
    UpdatePasswordRequest:
      type: object
      properties:
        newPassword:
          type: string
        currentPassword:
          type: string
      required:
        - newPassword
        - currentPassword
    RevokeAllSessionsRequest:
      type: object
      properties:
        currentSessionId:
          type: string
      required:
        - currentSessionId
    ActiveSession:
      type: object
      properties:
        id:
          type: string
        userlandUserId:
          type: string
        ipAddress:
          type:
            - string
            - 'null'
        userAgent:
          type:
            - string
            - 'null'
        organizationId:
          type:
            - string
            - 'null'
        state:
          type: object
