interface:
  display_name: "SumUp MCP"
  short_description: "Configure and use the SumUp MCP server."
  icon_small: "./assets/small-logo.svg"
  icon_large: "./assets/large-logo.png"
  brand_color: "#fbfbf9"
  default_prompt: "Use $sumup-mcp to configure the SumUp MCP server."

dependencies:
  tools:
    - type: "mcp"
      value: "sumup"
      description: "SumUp MCP server"
      transport: "streamable_http"
      url: "https://mcp.sumup.com/mcp"
