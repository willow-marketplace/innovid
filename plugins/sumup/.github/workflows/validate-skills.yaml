name: Validate Skills

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate Claude marketplace
        run: |
          set -euo pipefail
          claude plugin validate .

      - name: Validate Claude plugin payload
        run: |
          set -euo pipefail
          claude plugin validate .

      - name: Check root plugin layout
        run: |
          set -euo pipefail
          ./scripts/sync-skills.sh

      - name: Validate all skills
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r skill_dir; do
            if [ ! -f "${skill_dir}/SKILL.md" ]; then
              continue
            fi
            found=1
            echo "Validating ${skill_dir}"
            uvx --from "git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref" \
              skills-ref validate "${skill_dir}/"
          done < <(find skills -mindepth 1 -maxdepth 1 -type d | sort)

          if [ "${found}" -eq 0 ]; then
            echo "No skills found under skills/"
            exit 1
          fi
