name: Post Release

on:
  workflow_run:
    workflows: ["Quarkus Perform Release"]
    types: [completed]

permissions:
  contents: write

jobs:
  release-version:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Get release version
        id: get-version
        run: |
          RELEASE_VERSION=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          echo "version=${RELEASE_VERSION}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-uber-jar:
    needs: release-version
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.release-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_VERSION }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Detect Maven Wrapper
        run: |
          if [ -f mvnw ]; then
            echo "MAVEN_EXEC=./mvnw" >> $GITHUB_ENV
          else
            echo "MAVEN_EXEC=mvn" >> $GITHUB_ENV
          fi

      - name: Build uber-jar
        run: $MAVEN_EXEC -B package -DskipTests -DskipITs -Dquarkus.package.jar.type=uber-jar

      - name: Upload uber-jar to GitHub Release
        run: |
          gh release upload ${RELEASE_VERSION} \
            target/quarkus-agent-mcp-${RELEASE_VERSION}-runner.jar \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-native-binary:
    needs: release-version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x86_64
            graalvm-distribution: mandrel
          - os: macos-13
            artifact: macos-x86_64
            graalvm-distribution: graalvm
          - os: macos-14
            artifact: macos-aarch64
            graalvm-distribution: graalvm
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_VERSION: ${{ needs.release-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_VERSION }}

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: 25
          distribution: ${{ matrix.graalvm-distribution }}
          cache: maven

      - name: Build native binary
        run: ./mvnw -B package -DskipTests -DskipITs -Dnative

      - name: Upload native binary to GitHub Release
        run: |
          mv target/quarkus-agent-mcp-${RELEASE_VERSION}-runner \
             target/quarkus-agent-mcp-${RELEASE_VERSION}-${{ matrix.artifact }}
          gh release upload ${RELEASE_VERSION} \
            target/quarkus-agent-mcp-${RELEASE_VERSION}-${{ matrix.artifact }} \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-plugin-version:
    needs: [release-version, upload-uber-jar]
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.release-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update plugin.json and marketplace.json
        run: |
          jq --arg v "$RELEASE_VERSION" '.version = $v' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json
          jq --arg v "$RELEASE_VERSION" '.plugins[0].version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

      - name: Commit updated plugin files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/*.json

          if git diff --staged --quiet; then
            echo "No plugin file changes to commit"
            exit 0
          fi

          git commit -m "chore: update plugin version to ${RELEASE_VERSION}"
          git push origin main
