# Quarkus Agent MCP Server Configuration
quarkus.banner.path=banner.txt

# MCP server identity and instructions
quarkus.mcp.server.server-info.name=quarkus-agent
quarkus.mcp.server.server-info.description=MCP server for creating, managing, and developing Quarkus applications
quarkus.mcp.server.server-info.instructions=You are working with the Quarkus Agent MCP server. \
  For ANY Quarkus-related question, documentation lookup, or development task, use these tools -- they are purpose-built for Quarkus.\n\n\
  WORKFLOW for new projects:\n\
  1. quarkus_create -- create and auto-start a Quarkus app (do not use 'mvn' or CLI manually)\n\
  2. quarkus_skills -- call before writing code to learn correct patterns (supports comma-separated queries, e.g. 'panache,rest')\n\
  3. quarkus_searchDocs -- search Quarkus docs for APIs, config, best practices (pass projectDir for version-matched results)\n\
  4. Write code and tests\n\
  5. Run tests -- see AGENTS.md in your project for mode-specific instructions\n\n\
  WORKFLOW for existing projects:\n\
  1. quarkus_start -- start the app (blocks until ready)\n\
  2. quarkus_skills -- learn extension-specific patterns before writing code\n\
  3. Write code following patterns from skills and docs\n\
  4. Run tests -- see AGENTS.md in your project for mode-specific instructions\n\n\
  WORKFLOW for migrating Spring Boot to Quarkus:\n\
  1. quarkus_skills -- call with the Spring project's directory to discover the migration skill (migrate-spring-to-quarkus)\n\
  2. Read and follow the migration skill instructions -- it provides a complete modular, gate-driven migration process\n\
  3. Do NOT plan your own migration approach -- the skill handles strategy selection, module execution, and verification\n\n\
  RULES:\n\
  - Use quarkus_searchDocs for Quarkus questions (pass projectDir when a project exists)\n\
  - Use quarkus_logs when you need log context for debugging\n\
  - Write tests for every feature\n\
  - Keep README.md updated\n\
  - Follow the AGENTS.md instructions generated in each project for testing, error handling, and reload workflows

# Make sure the tool names follow the spec rules
quarkus.mcp.server.tools.name-pattern=^[A-Za-z0-9_.-]{1,128}$

# Default Quarkus version for created projects (omit to use latest release)
# Uncomment for local testing against a SNAPSHOT build:
# agent-mcp.default-quarkus-version=999-SNAPSHOT

# Application mode: dev (default), test, or prod
# dev  — quarkus:dev / quarkusDev (hot reload, Dev MCP, Dev UI, all tools)
# test — quarkus:run / quarkusRun with -Dquarkus.profile=test (dev-only tools removed)
# prod — quarkus:run / quarkusRun (dev-only tools removed)
agent-mcp.mode=dev

# Extra arguments appended to every Maven/Gradle command line
# Useful for WSL setups where the debugger must bind to all interfaces:
# agent-mcp.extra-args=-DdebugHost=*

# Include transitive dependencies when scanning for extension skills
# Default is false (only direct dependencies) for backward compatibility
# Set to true to discover skills from indirect dependencies as well
# Can also be set via AGENT_MCP_SKILLS_INCLUDE_TRANSITIVE environment variable
agent-mcp.skills.include-transitive=false

# Doc search - Quarkus 3.36+: generic pgvector container, data loaded from SQL fragments
# in extension deployment JARs (META-INF/quarkus-rag.sql)
agent-mcp.doc-search.image=ghcr.io/quarkusio/quarkus-agent-pgvector:pg17
# Doc search - pre-3.36: pre-built image with documentation baked in
agent-mcp.doc-search.image-prefix=ghcr.io/quarkusio/chappie-ingestion-quarkus
agent-mcp.doc-search.image-tag=latest
agent-mcp.doc-search.pg-user=quarkus
agent-mcp.doc-search.pg-password=quarkus
agent-mcp.doc-search.pg-database=quarkus
agent-mcp.doc-search.min-score=0.82

# Testcontainers reuse - keeps the pgvector container across MCP server restarts
testcontainers.reuse.enable=true

# Native image: defer class initialization to runtime for classes that create
# threads, reference Windows-only JNA classes, or hold java.lang.ref.Cleaner instances
quarkus.native.additional-build-args=\
  --initialize-at-run-time=org.testcontainers,\
  --initialize-at-run-time=com.github.dockerjava,\
  --initialize-at-run-time=org.postgresql.sspi.SSPIClient,\
  --initialize-at-run-time=org.postgresql.util.LazyCleanerImpl,\
  --enable-url-protocols=https
quarkus.native.auto-service-loader-registration=true

# Logging
# stdout is the MCP JSON-RPC transport channel -- log output must not interfere
# to avoid corrupting the protocol stream or causing a deadlock on the stdout pipe.
quarkus.log.console.enabled=false
quarkus.log.level=INFO
quarkus.log.category."io.quarkus.agent.mcp".level=DEBUG

