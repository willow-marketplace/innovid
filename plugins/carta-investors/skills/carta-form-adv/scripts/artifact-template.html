<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    :root {
      color-scheme: light;
      --surface-bg: #FFFFFF;
      --surface-underlay: #F1F1F1;
      --text-default: #1A1A1A;
      --text-subtle: #656B6B;
      --border-default: #A7AAAA;
      --border-subtle: #DEDFDF;
      --positive-subtle: #EBF7F6;
      --positive-strong: #2D9E90;
      --info-subtle: #EAF0F8;
      --info-strong: #285DA3;
      --warn-subtle: #FFF4E5;
      --warn-strong: #CC4400;
      --negative-subtle: #FFEEEF;
      --negative-strong: #E52431;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter var", -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--surface-bg);
      color: var(--text-default);
      font-size: 14px;
      line-height: 1.5;
    }

    .page { max-width: 1100px; margin: 0 auto; padding: 24px 24px 48px; }

    /* ── Header ─────────────────────────────────────────────────────── */
    .hdr { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-subtle); }
    .hdr-text { flex: 1; min-width: 0; }
    .hdr-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-subtle); margin-bottom: 4px; }
    .hdr h1 { font-size: 24px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
    .hdr-sub { font-size: 13px; color: var(--text-subtle); }
    .hdr-logo { flex-shrink: 0; padding-top: 2px; }
    .hdr-logo svg { width: 64px; height: auto; display: block; }

    /* ── Metric cards ────────────────────────────────────────────────── */
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .metric { border: 1px solid var(--border-subtle); padding: 16px 20px; }
    .metric-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-subtle); margin-bottom: 6px; }
    .metric-value { font-size: 26px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text-default); }
    .metric-note { font-size: 11px; color: var(--text-subtle); margin-top: 4px; }

    /* ── Tabs ────────────────────────────────────────────────────────── */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border-subtle); margin-bottom: 28px; }
    .tab-btn { padding: 8px 20px; font-size: 14px; font-weight: 500; border: none; background: none; cursor: pointer; color: var(--text-subtle); border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab-btn.active { color: var(--info-strong); border-bottom-color: var(--info-strong); }
    .tab-btn:hover:not(.active) { color: var(--text-default); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Section headings ───────────────────────────────────────────── */
    .section { margin-bottom: 32px; }
    .section-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .section-sub { font-size: 12px; color: var(--text-subtle); margin-bottom: 12px; }

    /* ── Tables ──────────────────────────────────────────────────────── */
    .tbl-wrap { border: 1px solid var(--border-subtle); overflow-x: auto; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--surface-bg); padding: 9px 16px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text-default); border-bottom: 1px solid var(--border-default); white-space: nowrap; }
    td { padding: 9px 16px; border-bottom: 1px solid var(--border-subtle); font-size: 13px; vertical-align: top; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--surface-underlay); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .total-row td { font-weight: 600; background: var(--surface-underlay); }

    /* ── Badges ──────────────────────────────────────────────────────── */
    .badge { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; padding: 1px 6px; border-radius: 3px; vertical-align: middle; margin-left: 6px; }
    .badge-carta { background: var(--info-subtle); color: var(--info-strong); }
    .badge-manual { background: var(--warn-subtle); color: var(--warn-strong); }
    .badge-flag { background: var(--negative-subtle); color: var(--negative-strong); }

    /* ── Fund accordion ──────────────────────────────────────────────── */
    .fund-list { display: flex; flex-direction: column; gap: 8px; }
    .fund-card { border: 1px solid var(--border-subtle); }
    .fund-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; user-select: none; }
    .fund-header:hover { background: var(--surface-underlay); }
    .fund-name { font-size: 14px; font-weight: 600; }
    .fund-meta { font-size: 12px; color: var(--text-subtle); margin-top: 2px; }
    .fund-aum-chip { font-size: 12px; font-variant-numeric: tabular-nums; color: var(--text-subtle); margin-right: 8px; }
    .fund-toggle { font-size: 18px; color: var(--text-subtle); transition: transform 0.2s; }
    .fund-card.open .fund-toggle { transform: rotate(180deg); }
    .fund-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border-subtle); }
    .fund-card.open .fund-body { display: block; }

    .fund-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 16px; }
    @media (max-width: 700px) { .fund-grid { grid-template-columns: 1fr; } }
    .fund-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-subtle); margin-bottom: 8px; padding-top: 4px; }
    .fund-kv { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--border-subtle); font-size: 13px; }
    .fund-kv:last-child { border-bottom: none; }
    .fund-kv .k { color: var(--text-subtle); flex-shrink: 0; max-width: 55%; }
    .fund-kv .v { font-variant-numeric: tabular-nums; text-align: right; }
    .pit-note { font-size: 11px; color: var(--warn-strong); background: var(--warn-subtle); padding: 6px 10px; margin-top: 10px; border-left: 3px solid var(--warn-strong); }

    /* ── IARD checklist ──────────────────────────────────────────────── */
    .checklist { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .checklist li { display: flex; gap: 12px; padding: 10px 14px; border: 1px solid var(--border-subtle); font-size: 13px; }
    .checklist .step-num { font-size: 12px; font-weight: 700; color: var(--info-strong); min-width: 20px; }
    .coverage-table td:first-child { font-weight: 500; }
    .coverage-table .src { font-size: 11px; color: var(--text-subtle); }

    /* ── Legend ──────────────────────────────────────────────────────── */
    .legend { display: flex; gap: 16px; margin-bottom: 20px; font-size: 12px; color: var(--text-subtle); }
    .legend-item { display: flex; align-items: center; gap: 5px; }

    /* ── Footer ──────────────────────────────────────────────────────── */
    .footer { margin-top: 40px; padding-top: 12px; border-top: 1px solid var(--border-subtle); font-size: 11px; color: var(--text-subtle); }

    /* ── Print ───────────────────────────────────────────────────────── */
    @media print {
      .tabs { display: none; }
      .tab-pane { display: block !important; }
      .fund-body { display: block !important; }
      .fund-header { cursor: default; }
      .fund-toggle { display: none; }
      .fund-card { break-inside: avoid; margin-bottom: 12px; }
      .page { padding: 0; max-width: 100%; }
      body { font-size: 12px; }
      .metric-value { font-size: 20px; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <div class="hdr-text">
      <div class="hdr-eyebrow">Form ADV Part 1A — Filing Preparation Guide</div>
      <h1 id="hdr-title"></h1>
      <div class="hdr-sub" id="hdr-sub"></div>
    </div>
    <div class="hdr-logo" aria-label="Carta">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 528 264" aria-hidden="true"><path fill="#1a1a1a" d="M0,0v264h528V0H0ZM517.44,253.44H10.56V10.56h506.88v242.88ZM69.26,137.15c0-26.47,22.34-42,42.39-42,14.35,0,27.74,5.38,34.9,17.78l-13.4,7.77c-2.31-3.49-5.47-6.35-9.17-8.3-3.71-1.96-7.85-2.98-12.05-2.95-11.79,0-25.81,9.2-25.81,27.42s13.41,27.58,26.93,27.58c9.4,0,17.21-5.24,21.84-13.33l13.7,6.33c-7.76,13.95-21.62,21.38-37.72,21.38-20.25-.02-41.6-15.58-41.6-41.69h0ZM197.5,178.83c11.14,0,21.66-4.91,27.09-12.05v9.81h16.55v-79.39h-16.55v9.83c-5.16-7.2-15.93-11.89-27.09-11.89-24.38,0-41.44,17.75-41.44,41.84s17.21,41.84,41.44,41.84ZM199.09,110.21c15.3,0,25.8,11.41,25.8,26.78s-10.51,26.78-25.8,26.78-26.14-11.57-26.14-27.1,10.84-26.47,26.14-26.47ZM330.1,112.96h-17.18v-15.85h17.34v-20.69h17.05v20.69h17.33v15.85h-17.33v63.61h-17.21v-63.61ZM412.2,178.83c11.16,0,21.68-4.91,27.11-12.05v9.81h16.58v-79.39h-16.58v9.83c-5.16-7.2-15.93-11.89-27.11-11.89-24.36,0-41.42,17.75-41.42,41.84s17.2,41.84,41.42,41.84ZM413.81,110.21c15.28,0,25.81,11.41,25.81,26.78s-10.53,26.78-25.81,26.78-26.14-11.57-26.14-27.1,10.84-26.47,26.14-26.47ZM278.62,176.49h-17.21v-79.39h15.77v14.78c3.9-8.78,9.77-14.5,19.3-14.98,1.97-.03,3.93,0,5.89.21l-.26,15.89c-13.69,0-23.47,7.34-23.47,27.79v35.72h-.01Z"/></svg>
    </div>
  </div>

  <div class="metrics" id="metrics"></div>

  <div class="tabs" id="tab-nav"></div>

  <div id="tab-firm" class="tab-pane active"></div>
  <div id="tab-funds" class="tab-pane"></div>
  <div id="tab-iard" class="tab-pane"></div>

  <div class="footer" id="footer"></div>
</div>

<script>
const DATA = {{DATA}};

// ── Formatting helpers ────────────────────────────────────────────────────
function esc(s) {
  if (s == null || s === '') return '—';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt$(n) {
  if (n == null || n === '') return '—';
  const abs = Math.abs(Number(n));
  const s = '$' + abs.toLocaleString('en-US', { maximumFractionDigits: 0 });
  return Number(n) < 0 ? '(' + s + ')' : s;
}
function fmtPct(n, decimals = 1) {
  if (n == null || n === '') return '—';
  return Number(n).toFixed(decimals) + '%';
}
function fmtNum(n) {
  if (n == null || n === '') return '—';
  return Number(n).toLocaleString('en-US');
}
function fmtDate(s) {
  if (!s) return '—';
  return String(s).slice(0, 10);
}
function badge(type, text) {
  return `<span class="badge badge-${type}">${text}</span>`;
}

// ── Tab switching ─────────────────────────────────────────────────────────
function initTabs() {
  const tabs = [
    { id: 'tab-firm',  label: 'Firm Overview' },
    { id: 'tab-funds', label: `Per-Fund Detail (${(DATA.funds || []).length})` },
    { id: 'tab-iard',  label: 'IARD Checklist' },
  ];
  const nav = document.getElementById('tab-nav');
  tabs.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(t.id).classList.add('active');
    };
    nav.appendChild(btn);
  });
}

// ── Firm rollup (computed from per-fund rows — firm_rollup key removed from schema) ───
function computeFirmRollup() {
  const funds = DATA.funds || [];
  return funds.reduce((acc, f) => {
    acc.regulatory_aum               += f.regulatory_aum               || 0;
    acc.fair_market_value            += f.fair_market_value            || 0;
    acc.cash                         += f.cash                         || 0;
    acc.other_assets                 += f.other_assets                 || 0;
    acc.total_gross_assets           += f.total_gross_assets           || 0;
    acc.unfunded_commitments         += f.unfunded_commitments         || 0;
    acc.total_borrowings_outstanding += f.total_borrowings_outstanding || 0;
    acc.net_asset_value              += f.net_asset_value              || 0;
    return acc;
  }, {
    regulatory_aum: 0, fair_market_value: 0, cash: 0, other_assets: 0,
    total_gross_assets: 0, unfunded_commitments: 0, total_borrowings_outstanding: 0,
    net_asset_value: 0,
  });
}

// ── Header ────────────────────────────────────────────────────────────────
function renderHeader() {
  document.getElementById('hdr-title').textContent = DATA.firm_name || 'Form ADV Preparation';
  document.getElementById('hdr-sub').textContent =
    `Reporting date: ${fmtDate(DATA.reporting_date)}  ·  Data from Carta  ·  Verify legal names, fiscal year ends, and IARD fund IDs before filing`;
  document.title = `${DATA.firm_name} — Form ADV ${(DATA.reporting_date || '').slice(0,4)}`;
}

// ── Firm-level LP aggregates ─────────────────────────────────────────────
// Prefer the SQL-computed `firm_aggregates` block (distinct partner counts).
// Falls back to summing per-fund counts if the block is absent, which
// double-counts any LP committed to multiple funds — surface a warning then.
function getFirmLpAggregates() {
  const fa = DATA.firm_aggregates;
  if (fa && (fa.total_lp_investors != null || fa.us_lp_investors != null)) {
    return {
      source: 'firm_aggregates',
      total_lp:    fa.total_lp_investors ?? null,
      us_lp:       fa.us_lp_investors ?? 0,
      non_us_lp:   fa.non_us_lp_investors ?? 0,
      no_country:  fa.lp_investors_no_country_on_file ?? 0,
      total_nav:   fa.total_lp_nav ?? 0,
      non_us_nav:  fa.non_us_lp_nav ?? 0,
      pct_non_us_count: fa.pct_non_us_lp_investors ?? null,
      pct_non_us_nav:   fa.pct_non_us_lp_nav ?? null,
    };
  }
  // Legacy fallback — sum per-fund counts (double-counts multi-fund LPs).
  const funds = DATA.funds || [];
  const demos = DATA.investor_demographics || {};
  let usLPs = 0, nonUsLPs = 0, noCtry = 0, totalLPNav = 0, nonUsNav = 0;
  Object.values(demos).forEach(d => {
    usLPs      += d.us_lp_investors || 0;
    nonUsLPs   += d.non_us_lp_investors || 0;
    noCtry     += d.lp_investors_no_country_on_file || 0;
    totalLPNav += d.total_lp_nav || 0;
    nonUsNav   += d.non_us_lp_nav || 0;
  });
  const totalLPs = funds.reduce((s, f) => s + (f.beneficial_owners_lp || 0), 0);
  const known    = usLPs + nonUsLPs;
  return {
    source: 'per_fund_sum',
    total_lp:    totalLPs,
    us_lp:       usLPs,
    non_us_lp:   nonUsLPs,
    no_country:  noCtry,
    total_nav:   totalLPNav,
    non_us_nav:  nonUsNav,
    pct_non_us_count: known > 0 ? nonUsLPs / known * 100 : null,
    pct_non_us_nav:   totalLPNav > 0 ? nonUsNav / totalLPNav * 100 : null,
  };
}

// ── Summary metrics ───────────────────────────────────────────────────────
function renderMetrics() {
  const fr = computeFirmRollup();
  const funds = DATA.funds || [];
  const lp = getFirmLpAggregates();
  const lpNote = lp.source === 'firm_aggregates'
    ? 'Distinct beneficial owners'
    : '⚠ Sum across funds (may double-count multi-fund LPs)';
  const items = [
    { label: 'Regulatory AUM', value: fmt$(fr.regulatory_aum), note: 'Gross assets + unfunded' },
    { label: 'Total NAV', value: fmt$(fr.net_asset_value), note: 'LP + GP capital' },
    { label: 'Funds', value: fmtNum(funds.length), note: 'Active private funds' },
    { label: 'LP Investors', value: fmtNum(lp.total_lp), note: lpNote },
  ];
  const el = document.getElementById('metrics');
  el.innerHTML = items.map(m => `
    <div class="metric">
      <div class="metric-label">${m.label}</div>
      <div class="metric-value">${m.value}</div>
      <div class="metric-note">${m.note}</div>
    </div>`).join('');
}

// ── Tab 1: Firm Overview ──────────────────────────────────────────────────
function renderFirmTab() {
  const fr = computeFirmRollup();
  const funds = DATA.funds || [];

  // Use SQL-computed firm aggregates if present; otherwise legacy per-fund sum.
  const lp = getFirmLpAggregates();
  const usLPs      = lp.us_lp;
  const nonUsLPs   = lp.non_us_lp;
  const noCtry     = lp.no_country;
  const totalLPNav = lp.total_nav;
  const nonUsNav   = lp.non_us_nav;
  const totalKnown    = usLPs + nonUsLPs;
  const pctUsCount    = totalKnown > 0 ? usLPs / totalKnown * 100 : null;
  const pctNonUsCount = lp.pct_non_us_count != null ? lp.pct_non_us_count
                       : (totalKnown > 0 ? nonUsLPs / totalKnown * 100 : null);
  const pctUsNav      = totalLPNav > 0 ? (totalLPNav - nonUsNav) / totalLPNav * 100 : null;
  const pctNonUsNav   = lp.pct_non_us_nav != null ? lp.pct_non_us_nav
                       : (totalLPNav > 0 ? nonUsNav / totalLPNav * 100 : null);

  const totalFunds = funds.length;

  const aggregateWarning = lp.source === 'per_fund_sum'
    ? `<div style="background:#FEF3C7;border:1px solid #F59E0B;border-radius:8px;padding:12px 14px;margin-bottom:18px;color:#78350F;font-size:13px;">
         ⚠ <strong>Firm-level counts may be inflated.</strong> The data file is missing the
         <code>firm_aggregates</code> block, so LP counts shown below are summed across funds —
         partners committed to multiple funds will be counted multiple times. Re-run the skill
         to populate <code>firm_aggregates</code> from Query 3 for accurate distinct counts.
       </div>`
    : '';

  document.getElementById('tab-firm').innerHTML = `
    ${aggregateWarning}
    <div class="legend">
      <span class="legend-item">${badge('carta','Carta fills')} Carta can provide this value</span>
      <span class="legend-item">${badge('manual','Manual')} Must be entered directly in IARD</span>
    </div>

    <div class="section">
      <div class="section-title">Item 5.F — Regulatory AUM ${badge('carta','Carta fills')}</div>
      <div class="section-sub">Private fund advisers use the gross asset method (assets + unfunded commitments). All AUM is classified as discretionary.</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Item 5.F</th><th class="num">Amount</th><th class="num"># Accounts</th></tr></thead>
          <tbody>
            <tr><td>Discretionary regulatory AUM</td><td class="num">${fmt$(fr.regulatory_aum)}</td><td class="num">${fmtNum(totalFunds)}</td></tr>
            <tr><td>Non-discretionary regulatory AUM</td><td class="num">$0</td><td class="num">0</td></tr>
            <tr class="total-row"><td>Total Regulatory AUM</td><td class="num">${fmt$(fr.regulatory_aum)}</td><td class="num">${fmtNum(totalFunds)}</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Item 5.D — Client Type ${badge('carta','Carta fills')}</div>
      <div class="section-sub">Based on fund entity types. 100% Pooled Investment Vehicles (private funds).</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Client Type</th><th class="num">% of Clients</th><th class="num"># Accounts</th></tr></thead>
          <tbody>
            <tr><td>Pooled Investment Vehicles (other than registered investment companies or BDCs)</td>
                <td class="num">100%</td><td class="num">${fmtNum(totalFunds)}</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Item 5.H — Non-US Clients ${badge('carta','Carta fills')} ${badge('manual','Verify')}</div>
      <div class="section-sub">Based on <code>partner_country</code> field in Carta. Country detection is approximate — confirm completeness before filing. Partners with no country on file are excluded from the US/Non-US calculation.</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Residency</th><th class="num">LP Count</th><th class="num">% of LP Investors</th><th class="num">Approx. LP NAV</th><th class="num">% of LP NAV</th></tr></thead>
          <tbody>
            <tr><td>US persons</td><td class="num">${fmtNum(usLPs)}</td>
                <td class="num">${fmtPct(pctUsCount)}</td>
                <td class="num">${fmt$(totalLPNav - nonUsNav)}</td>
                <td class="num">${fmtPct(pctUsNav)}</td></tr>
            <tr><td>Non-US persons</td><td class="num">${fmtNum(nonUsLPs)}</td>
                <td class="num">${fmtPct(pctNonUsCount)}</td>
                <td class="num">${fmt$(nonUsNav)}</td>
                <td class="num">${fmtPct(pctNonUsNav)}</td></tr>
            <tr><td>No country on file</td><td class="num">${fmtNum(noCtry)}</td><td class="num">—</td><td class="num">—</td><td class="num">—</td></tr>
          </tbody>
        </table>
      </div>
      <p style="font-size:12px;color:var(--text-subtle);">
        For Item 5.H, SEC asks what % of regulatory AUM comes from non-US clients.
        Approximate: <strong>${fmtPct(pctNonUsNav)}</strong> of LP NAV from non-US investors.
      </p>
    </div>

    <div class="section">
      <div class="section-title">Balance Sheet Components ${badge('carta','Carta fills')}</div>
      <div class="section-sub">Firm-wide totals (sum across all funds). Regulatory AUM = gross assets + unfunded commitments.</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Component</th><th class="num">Amount</th><th>Notes</th></tr></thead>
          <tbody>
            <tr><td>Fair Market Value (FMV)</td><td class="num">${fmt$(fr.fair_market_value)}</td><td class="src">Accounts 1100+1101</td></tr>
            <tr><td>Cash &amp; cash equivalents</td><td class="num">${fmt$(fr.cash)}</td><td class="src">Accounts 1000–1099</td></tr>
            <tr><td>Other assets</td><td class="num">${fmt$(fr.other_assets)}</td><td class="src">Accounts 1200–1899</td></tr>
            <tr class="total-row"><td>Total Gross Assets</td><td class="num">${fmt$(fr.total_gross_assets)}</td><td></td></tr>
            <tr><td>+ Unfunded commitments</td><td class="num">${fmt$(fr.unfunded_commitments)}</td><td class="src">Commitment − contributions</td></tr>
            <tr class="total-row"><td>= Regulatory AUM</td><td class="num">${fmt$(fr.regulatory_aum)}</td><td></td></tr>
            <tr><td>Borrowings (LOC outstanding)</td><td class="num">${fmt$(fr.total_borrowings_outstanding)}</td><td class="src">Accounts 2000–2999 (negated)</td></tr>
            <tr><td>Total NAV</td><td class="num">${fmt$(fr.net_asset_value)}</td><td class="src">From NAV calculations</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ── Tab 2: Per-Fund Detail ────────────────────────────────────────────────
function renderFundsTab() {
  const funds = DATA.funds || [];
  const demos = DATA.investor_demographics || {};

  const el = document.getElementById('tab-funds');
  if (!funds.length) {
    el.innerHTML = '<p style="color:var(--text-subtle);padding:20px 0">No fund data available.</p>';
    return;
  }

  el.innerHTML = `
    <div class="legend">
      <span class="legend-item">${badge('carta','Carta fills')} Pre-filled from Carta data</span>
      <span class="legend-item">${badge('manual','Manual')} Enter directly in IARD</span>
      <span class="legend-item">${badge('flag','Verify')} Confirm before filing</span>
    </div>
    <div class="fund-list" id="fund-list"></div>`;

  const list = document.getElementById('fund-list');

  funds.forEach(f => {
    const d = demos[f.fund_uuid] || {};
    const isPIT = f.investor_count_is_point_in_time;
    const pitNote = isPIT
      ? `Counts are as of ${fmtDate(DATA.reporting_date)} (point-in-time from NAV calculation).`
      : `Counts are a current snapshot — NAV not calculated for ${fmtDate(DATA.reporting_date)}. Verify against subscription register.`;

    const card = document.createElement('div');
    card.className = 'fund-card';
    card.innerHTML = `
      <div class="fund-header" onclick="this.closest('.fund-card').classList.toggle('open')">
        <div>
          <div class="fund-name">${esc(f.fund_name)}</div>
          <div class="fund-meta">${esc(f.fund_type_classification)}  ·  ${esc(f.investment_strategy_code)}  ·  Formed ${fmtDate(f.formation_date)}</div>
        </div>
        <div style="display:flex;align-items:center">
          <span class="fund-aum-chip">Reg AUM: ${fmt$(f.regulatory_aum)}</span>
          <span class="fund-toggle">&#8964;</span>
        </div>
      </div>
      <div class="fund-body">
        <div class="fund-grid">

          <div>
            <div class="fund-section-title">Identification ${badge('carta','Carta fills')} ${badge('flag','Verify')}</div>
            ${kv('Fund type (SEC classification)', f.fund_type_classification)}
            ${kv('Strategy code (Carta)', f.investment_strategy_code)}
            ${kv('Legal structure', f.legal_structure)}
            ${kv('Formation date', fmtDate(f.formation_date))}
            ${kv('Fund family', f.fund_family_name || '—')}

            <div class="fund-section-title" style="margin-top:16px">Balance Sheet ${badge('carta','Carta fills')}</div>
            ${kv('FMV (investments)', fmt$(f.fair_market_value))}
            ${kv('Cash', fmt$(f.cash))}
            ${kv('Other assets', fmt$(f.other_assets))}
            ${kv('Total gross assets', fmt$(f.total_gross_assets))}
            ${kv('Borrowings outstanding', fmt$(f.total_borrowings_outstanding))}
            ${kv('Unfunded commitments', fmt$(f.unfunded_commitments))}
            ${kv('Regulatory AUM', fmt$(f.regulatory_aum))}
            ${kv('Net asset value (NAV)', fmt$(f.net_asset_value))}
            ${kv('LP NAV', fmt$(f.lp_nav))}
            ${kv('GP NAV', fmt$(f.gp_nav))}
          </div>

          <div>
            <div class="fund-section-title">Capital Activity — Annual ${badge('carta','Carta fills')}</div>
            ${kv('LP subscriptions', fmt$(f.annual_lp_subscriptions))}
            ${kv('GP subscriptions', fmt$(f.annual_gp_subscriptions))}
            ${kv('LP distributions', fmt$(f.annual_lp_distributions))}
            ${kv('GP distributions', fmt$(f.annual_gp_distributions))}

            <div class="fund-section-title" style="margin-top:16px">Capital Activity — ITD ${badge('carta','Carta fills')}</div>
            ${kv('LP contributions', fmt$(f.lp_contributions_since_inception))}
            ${kv('LP distributions', fmt$(f.lp_distributions_since_inception))}
            ${kv('Total committed', fmt$(f.total_committed_capital))}

            <div class="fund-section-title" style="margin-top:16px">Beneficial Owners ${badge('carta','Carta fills')}</div>
            ${kv('LP investors', fmtNum(d.lp_investors || f.beneficial_owners_lp))}
            ${kv('GP investors', fmtNum(d.gp_investors || f.beneficial_owners_gp))}
            ${kv('Total investors', fmtNum(d.total_active_investors || f.total_beneficial_owners))}
            ${kv('US LP investors', fmtNum(d.us_lp_investors))}
            ${kv('Non-US LP investors', fmtNum(d.non_us_lp_investors))}
            ${kv('No country on file', fmtNum(d.lp_investors_no_country_on_file))}
            ${kv('% non-US investors', fmtPct(d.pct_non_us_lp_investors))}
            ${kv('Non-US LP NAV', fmt$(d.non_us_lp_nav))}
            ${kv('% non-US LP NAV', fmtPct(d.pct_non_us_lp_nav))}

            <div class="fund-section-title" style="margin-top:16px">Investor Entity Types ${badge('carta','Carta fills')}</div>
            ${kv('Individual / natural person', fmtNum(d.individual_investors))}
            ${kv('Trust / foundation / endowment', fmtNum(d.trust_foundation_investors))}
            ${kv('Corporation / LLC', fmtNum(d.corporate_investors))}
            ${kv('Pension / retirement plan', fmtNum(d.pension_plan_investors))}
            ${kv('Other fund (fund-of-funds)', fmtNum(d.fund_investors))}
          </div>
        </div>

        <div class="fund-section-title" style="margin-top:16px">Asset Composition — §5.K.(1) ${badge('carta','Carta fills')}</div>
        <div class="tbl-wrap" style="margin-top:8px">
          <table>
            <thead><tr><th>Asset Class</th><th class="num">FMV</th><th class="num">% of Portfolio</th></tr></thead>
            <tbody>
              ${assetRow('Exchange-traded equity', f.fmv_exchange_traded_equity, f.total_active_fmv)}
              ${assetRow('Private equity / direct investments', f.fmv_private_equity, f.total_active_fmv)}
              ${assetRow('Pooled investment vehicles', f.fmv_pooled_investment_vehicles, f.total_active_fmv)}
              ${assetRow('Digital assets / crypto', f.fmv_digital_assets, f.total_active_fmv)}
              ${assetRow('Options &amp; warrants', f.fmv_options_and_warrants, f.total_active_fmv)}
              ${assetRow('Other alternatives', f.fmv_other_alternatives, f.total_active_fmv)}
              <tr class="total-row"><td>Total active FMV</td><td class="num">${fmt$(f.total_active_fmv)}</td><td class="num">100%</td></tr>
            </tbody>
          </table>
        </div>

        <div class="pit-note">${isPIT ? '✓ ' : '⚠ '}${pitNote}</div>
      </div>`;
    list.appendChild(card);
  });
}

function kv(label, value) {
  return `<div class="fund-kv"><span class="k">${label}</span><span class="v">${esc(value)}</span></div>`;
}

function assetRow(label, fmv, total) {
  const pct = (fmv && total && total > 0) ? fmtPct(fmv / total * 100) : '—';
  return `<tr><td>${label}</td><td class="num">${fmt$(fmv)}</td><td class="num">${pct}</td></tr>`;
}

        ${step(8,  `Schedule D §7.B.(1) — Beneficial owner types: select checkboxes for individual, corporate, pension, fund-of-funds, etc. ${badge('carta','Carta fills')} ${badge('manual','% estimates')}`)}
        ${step(9,  `Schedule D §5.K.(1) — Asset composition: enter asset class FMV breakdowns from the Per-Fund Detail tab. ${badge('carta','Carta fills')}`)}

            <tr><td>Sched D §7.B.(1) — Fund ID</td><td>${badge('manual','Manual')}</td><td class="src">—</td><td>IARD fund ID must be entered manually</td></tr>
            <tr><td>Sched D §7.B.(1) — Formation date</td><td>${badge('carta','Carta fills')} ${badge('flag','Verify')}</td><td class="src">FUNDS.vintage_date</td><td>GL vintage date — verify against formation docs</td></tr>
            <tr><td>Sched D §7.B.(1) — Fund type</td><td>${badge('carta','Carta fills')} ${badge('flag','Verify')}</td><td class="src">FUNDS.investment_strategy_code</td><td>Final SEC classification is a legal determination</td></tr>
            <tr><td>Sched D §7.B.(1) — NAV &amp; AUM</td><td>${badge('carta','Carta fills')}</td><td class="src">MONTHLY_NAV_CALCULATIONS + JOURNAL_ENTRIES</td><td>Requires NAV calculation for reporting date</td></tr>

function step(n, text) {
  return `<li><span class="step-num">${n}</span><span>${text}</span></li>`;
}

// ── Footer ────────────────────────────────────────────────────────────────
function renderFooter() {
  document.getElementById('footer').innerHTML =
    `Data as of ${fmtDate(DATA.reporting_date)} · Balance sheet uses effective_date (accounting date) · ` +
    `Verify legal names, fiscal year ends, and IARD fund IDs before filing · Generated by Carta AI`;
}

// ── Init ──────────────────────────────────────────────────────────────────
renderHeader();
renderMetrics();
initTabs();
renderFirmTab();
renderFundsTab();
renderIARDTab();
renderFooter();
</script>
