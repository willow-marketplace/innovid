# Canonical investor name groupings for SPA co-investor analysis.
#
# Each entry collapses one firm's many fund-vehicle naming variations
# (e.g. "Y Combinator ES20, LLC" + "YCP24, L.P." + "AVCF5 LLC") into a
# single canonical row when aggregating co-investor counts.
#
# Order matters — first match wins, so put the most-specific patterns
# first (e.g. "AH American Dynamism%" before "%Andreessen Horowitz%"
# is fine because both produce the same canonical name).
#
# Patterns use SQL ILIKE syntax: `%` matches any sequence; `_` matches
# any single character. Patterns are evaluated against the raw
# `PURCHASER_NAME` column from `FUND_ADMIN.DOCUMENT_AI_SPA_PURCHASER`.
#
# Add a new entry when you find a multi-vehicle firm whose vehicles
# share no token overlap (so the regex fallback in SKILL.md Step A1
# can't merge them). Single-vehicle firms don't need an entry — the
# regex fallback strips legal suffixes (`, L.P.` etc.) and series
# (`II`, `III`, `IV`, …) on its own.

groupings:
  - canonical: Y Combinator
    patterns:
      - "Y Combinator%"
      - "YC %"
      - "YCP%"
      - "YCC%"
      - "YCCG%"
      - "YC ESP%"
      - "YC Holdings%"
      - "AVCF%"
      - "AAVCF%"

  - canonical: Andreessen Horowitz
    patterns:
      - "%Andreessen Horowitz%"
      - "AH American Dynamism%"
      - "AH 20%"
      - "a16z%"

  - canonical: Sequoia Capital
    patterns:
      - "%Sequoia Capital%"

  - canonical: Kleiner Perkins
    patterns:
      - "%Kleiner Perkins%"
      - "KPCB%"

  - canonical: GV
    patterns:
      - "GV %"
      - "%Google Ventures%"

  - canonical: SV Angel
    patterns:
      - "%SV Angel%"

  - canonical: Soma Capital
